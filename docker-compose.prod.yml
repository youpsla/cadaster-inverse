services:
  db:
    restart: unless-stopped
    # ports commented — port 5432 conflict on this VPS, use docker compose exec
    # ports:
    #   - "127.0.0.1:5432:5432"
    env_file:
      - .env.prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: registry.gitlab.com/youpsla/cadastre-inverse/web:latest
    restart: unless-stopped
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run gunicorn config.wsgi -b 0.0.0.0:8000 -w 2 --access-logfile -"
    volumes:
      - data_volume:/app/data
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'X-Forwarded-Proto: https' http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data_volume:
  caddy_data:
  caddy_config:
